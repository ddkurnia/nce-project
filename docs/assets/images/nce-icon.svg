<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="nceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#0d1333"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="url(#bgGrad)"/>

  <!-- Subtle border glow -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="none" stroke="url(#nceGrad)" stroke-width="3" opacity="0.3"/>

  <!-- Decorative grid lines (subtle) -->
  <g clip-path="url(#roundClip)" opacity="0.04" stroke="#10b981" stroke-width="1">
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
  </g>

  <!-- Decorative diamond shape behind letter -->
  <path d="M512 200 L720 420 L512 640 L304 420 Z" fill="none" stroke="url(#nceGrad)" stroke-width="2" opacity="0.15"/>

  <!-- Decorative circle arcs -->
  <circle cx="512" cy="420" r="220" fill="none" stroke="url(#nceGrad)" stroke-width="1.5" opacity="0.1"/>
  <circle cx="512" cy="420" r="260" fill="none" stroke="url(#nceGrad)" stroke-width="1" opacity="0.06"/>

  <!-- Main NCE text -->
  <text x="512" y="460" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="280" font-weight="800" letter-spacing="12" fill="url(#nceGrad)" filter="url(#glow)">NCE</text>

  <!-- Subtle horizontal line under text -->
  <line x1="300" y1="510" x2="724" y2="510" stroke="url(#nceGrad)" stroke-width="3" opacity="0.4"/>

  <!-- Subtitle text -->
  <text x="512" y="580" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="56" font-weight="400" letter-spacing="8" fill="#94a3b8">COMMODITY</text>
  <text x="512" y="648" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="56" font-weight="400" letter-spacing="8" fill="#94a3b8">EXCHANGE</text>

  <!-- Small decorative dots -->
  <circle cx="300" cy="510" r="4" fill="#10b981" opacity="0.6"/>
  <circle cx="724" cy="510" r="4" fill="#06b6d4" opacity="0.6"/>

  <!-- Bottom decorative element - small bar chart icon -->
  <g transform="translate(420, 720)" opacity="0.25">
    <rect x="0" y="30" width="24" height="50" rx="4" fill="#10b981"/>
    <rect x="40" y="10" width="24" height="70" rx="4" fill="#06b6d4"/>
    <rect x="80" y="20" width="24" height="60" rx="4" fill="#10b981"/>
    <rect x="120" y="0" width="24" height="80" rx="4" fill="#06b6d4"/>
    <rect x="160" y="15" width="24" height="65" rx="4" fill="#10b981"/>
  </g>
</svg>
