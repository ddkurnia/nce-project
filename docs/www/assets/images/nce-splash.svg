<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="nceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#0d1333"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Dark navy background -->
  <rect x="0" y="0" width="1080" height="1920" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern overlay -->
  <rect x="0" y="0" width="1080" height="1920" fill="url(#grid)"/>

  <!-- Decorative diagonal lines -->
  <g opacity="0.03" stroke="#06b6d4" stroke-width="1">
    <line x1="-100" y1="400" x2="1180" y2="200"/>
    <line x1="-100" y1="500" x2="1180" y2="300"/>
    <line x1="-100" y1="600" x2="1180" y2="400"/>
    <line x1="-100" y1="1500" x2="1180" y2="1300"/>
    <line x1="-100" y1="1600" x2="1180" y2="1400"/>
    <line x1="-100" y1="1700" x2="1180" y2="1500"/>
  </g>

  <!-- Subtle radial glow behind logo -->
  <circle cx="540" cy="820" r="300" fill="#10b981" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Diamond shape behind NCE text -->
  <path d="M540 580 L740 780 L540 980 L340 780 Z" fill="none" stroke="url(#nceGrad)" stroke-width="2" opacity="0.12"/>

  <!-- Outer decorative circle -->
  <circle cx="540" cy="780" r="220" fill="none" stroke="url(#nceGrad)" stroke-width="1.5" opacity="0.08"/>
  <circle cx="540" cy="780" r="280" fill="none" stroke="url(#nceGrad)" stroke-width="1" opacity="0.05"/>

  <!-- Main NCE logo text -->
  <text x="540" y="830" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="200" font-weight="800" letter-spacing="16" fill="url(#nceGrad)" filter="url(#glow)">NCE</text>

  <!-- Decorative horizontal line under logo -->
  <line x1="280" y1="880" x2="800" y2="880" stroke="url(#lineGrad)" stroke-width="2"/>

  <!-- Small diamond accent on line -->
  <path d="M540 868 L548 880 L540 892 L532 880 Z" fill="url(#nceGrad)" opacity="0.5"/>

  <!-- "Nusantara Commodity Exchange" text -->
  <text x="540" y="960" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="52" font-weight="300" letter-spacing="4" fill="#ffffff" opacity="0.9">Nusantara Commodity Exchange</text>

  <!-- "Digital Marketplace for Real Commodities" tagline -->
  <text x="540" y="1030" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="34" font-weight="400" letter-spacing="2" fill="#10b981" opacity="0.7">Digital Marketplace for Real Commodities</text>

  <!-- Bottom decorative bar chart -->
  <g transform="translate(390, 1600)" opacity="0.12">
    <rect x="0" y="50" width="40" height="80" rx="6" fill="#10b981"/>
    <rect x="65" y="20" width="40" height="110" rx="6" fill="#06b6d4"/>
    <rect x="130" y="35" width="40" height="95" rx="6" fill="#10b981"/>
    <rect x="195" y="0" width="40" height="130" rx="6" fill="#06b6d4"/>
    <rect x="260" y="25" width="40" height="105" rx="6" fill="#10b981"/>
  </g>

  <!-- Bottom subtle line -->
  <line x1="280" y1="1800" x2="800" y2="1800" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Bottom version/branding text -->
  <text x="540" y="1840" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="3" fill="#475569">POWERED BY NCE</text>

  <!-- Corner decorative accents -->
  <!-- Top-left -->
  <path d="M0 0 L80 0 L80 3 L3 3 L3 80 L0 80 Z" fill="#10b981" opacity="0.15"/>
  <!-- Top-right -->
  <path d="M1080 0 L1000 0 L1000 3 L1077 3 L1077 80 L1080 80 Z" fill="#06b6d4" opacity="0.15"/>
  <!-- Bottom-left -->
  <path d="M0 1920 L80 1920 L80 1917 L3 1917 L3 1840 L0 1840 Z" fill="#10b981" opacity="0.15"/>
  <!-- Bottom-right -->
  <path d="M1080 1920 L1000 1920 L1000 1917 L1077 1917 L1077 1840 L1080 1840 Z" fill="#06b6d4" opacity="0.15"/>
</svg>
